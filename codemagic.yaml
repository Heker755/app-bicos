workflows:
  react-native-android:
    name: React Native Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - expo
      node: 18.18.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Expo Project
        script: |
          npx expo prebuild --platform android
      - name: Build Android App (APK)
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - felipe@exemplo.com
        notify:
          success: true
          failure: true